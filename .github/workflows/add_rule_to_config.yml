# This is a basic workflow to help you get started with Actions

name: add_line_to_config

# Controls when the workflow will run
on:
  # Allows you to run this workflow manually from the Actions tab
  repository_dispatch:
    types: [add_line_to_config] # 自定义事件类型，用于区分不同请求
  workflow_dispatch:
    inputs:
      text:
        description: '要添加到config.yaml的内容（必填）'
        required: true
        type: string
      path:
        description: '文件路径（默认根目录）'
        required: false
        type: string
        default: 'clash_rule/video_china.list'

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  add-line:
    runs-on: ubuntu-latest
    steps:
      # 1. 检出仓库代码
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          # 确保能推送到仓库（需要写权限）
          fetch-depth: 0

      # 2. 检查文件是否存在，不存在则创建
      - name: 检查/创建config.yaml
        run: |
          FILE_PATH="${{ github.event.client_payload.path || github.event.inputs.path || 'clash_rule/video_china.list' }}"
          if [ ! -f "$FILE_PATH" ]; then
            echo "# 自动创建的config.yaml文件" > "$FILE_PATH"
            echo "文件不存在，已创建: $FILE_PATH"
          fi

      # 3. 向config.yaml末尾添加指定内容
      - name: 添加内容到文件
        run: |
          # 获取输入参数
          TEXT="${{ github.event.client_payload.text || github.event.inputs.text }}"
          PATH="${{ github.event.client_payload.path || github.event.inputs.path || 'clash_rule/video_china.list' }}"
          
          # 向文件末尾追加内容（避免重复添加相同行）
          if ! grep -qxF "$TEXT" "$PATH"; then
            echo "$TEXT" >> "$PATH"
            echo "已添加内容: $TEXT:"
          else
            echo "内容已存在，无需重复添加: $TEXT"
            exit 0 # 内容已存在时正常退出，不报错
          fi

      # 4. 提交并推送修改
      - name: 提交并推送修改
        run: |
          # 配置git用户信息（必须，否则无法提交）
          git config --global user.name "pscchiang"
          git config --global user.email "brandon1587@gmail.com"
          
          # 检查是否有修改
          if git status --porcelain | grep -q .; then
            git add ${{ github.event.client_payload.path || github.event.inputs.path || 'clash_rule/video_china.list' }}
            git commit -m "feat: 添加内容到config.yaml - '${{  github.event.client_payload.text || github.event.inputs.text }}'"
           
            # 核心修复：重新设置远程仓库地址，携带PAT
            git remote set-url origin https://${{ secrets.PAT_TOKEN }}@github.com/pscchiang/config.git
            # 强制推送（仅建议测试时用，生产环境慎用，优先确认无冲突）
            git push origin main
            
            echo "修改已成功推送"
          else
            echo "无修改需要推送"
          fi

name: add_line_to_config

on:
  repository_dispatch:
    types: [add_line_to_config]
  workflow_dispatch:
    inputs:
      method:
        description: '选择规则类型'
        required: true
        type: choice
        options:
          - DOMAIN-SUFFIX
          - DOMAIN-KEYWORD
          - DOMAIN
          - IP-CIDR
        default: 'DOMAIN-SUFFIX'
        
      text:
        description: '填写域名/IP（例如 ddys.tv）'
        required: true
        type: string
        
      path:
        description: '选择文件路径'
        required: true
        type: choice
        options:
          - clash_rule/video_china.list
          - clash_rule/proxy.list
        default: 'clash_rule/video_china.list'

jobs:
  add-line:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: 检查文件是否存在
        run: |
          FILE_PATH="${{ github.event.client_payload.path || github.event.inputs.path }}"
          if [ ! -f "$FILE_PATH" ]; then
            echo "❌ 错误：文件不存在！路径：$FILE_PATH"
            exit 1
          fi
          echo "✅ 文件校验通过"

      - name: 组合内容并写入文件
        run: |
          # 获取参数
          METHOD="${{ github.event.client_payload.method || github.event.inputs.method }}"
          TEXT="${{ github.event.client_payload.text || github.event.inputs.text }}"
          PATH="${{ github.event.client_payload.path || github.event.inputs.path }}"

          # 检查是否为空
          if [ -z "$TEXT" ]; then
            echo "❌ 错误：内容不能为空"
            exit 1
          fi

          if [ -z "$METHOD" ]; then
            echo "❌ 错误：类型不能为空"
            exit 1
          fi

          # 组合成格式：DOMAIN-SUFFIX,ddys.tv
          LINE="${METHOD},${TEXT}"
          
          # 去重判断：文件中已存在则退出，不存在则添加
          if grep -qxF "$LINE" "$PATH"; then
            echo "ℹ️ 内容已存在，跳过添加：$LINE"
            exit 0
          else
            echo "$LINE" >> "$PATH"
            echo "✅ 已添加新规则：$LINE"
          fi

      - name: 提交并推送
        run: |
          git config --global user.name "pscchiang"
          git config --global user.email "brandon1587@gmail.com"
          
          if git status --porcelain | grep -q .; then
            git add .
            git commit -m "feat: 添加规则 - $LINE"
            git push
            echo "✅ 推送成功"
          else
            echo "ℹ️ 无修改"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
